services:
  db:
    image: pgvector/pgvector:pg16
    container_name: claude-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: memory_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./mcp-server
    container_name: claude-memory-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3333:3333"
    environment:
      DATABASE_URL: postgresql://claude:memory_pass@db:5432/memory
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3333/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

volumes:
  model_cache:
