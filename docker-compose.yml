services:
  db:
    image: pgvector/pgvector:pg16
    container_name: claude-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: memory
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: memory_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.24.0   # pinned (project policy); verified working with qwen2.5:7b @ num_ctx 16384 on 2026-06-01
    container_name: claude-memory-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"   # host access for Test-StackHealth.ps1
    environment:
      # Default served context for ALL models, including the OpenAI-compat /v1
      # path (which ignores per-request num_ctx). The bundled-runtime default of
      # 4096 silently truncated large behavioral-pass prompts; 16384 holds a
      # ~20k-char transcript + prompt + output. Option A: qwen2.5:7b @ 16k on an
      # 8GB GPU — may partially spill to CPU/RAM; acceptable for a background job.
      OLLAMA_CONTEXT_LENGTH: "16384"
      OLLAMA_KEEP_ALIVE: "10m"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  mcp-server:
    build: ./mcp-server
    container_name: claude-memory-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3333:3333"
    environment:
      DATABASE_URL: postgresql://claude:memory_pass@db:5432/memory
      # Default endpoint for pipeline scripts run via `docker compose run mcp-server`.
      # Reaches the in-stack ollama service over the compose network. The pipeline
      # also passes -e OLLAMA_URL explicitly; this is the fallback for bare runs.
      OLLAMA_URL: http://ollama:11434/v1
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3333/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  model_cache:
  ollama_models:
